<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>心经·𝐁𝐮𝐝𝐝𝐡𝐚 𝐂𝐨𝐫𝐞✧水月空相系统</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #050614 0%, #061129 50%, #02050f 100%);
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            font-family: "SimSun", "Songti SC", "STSong", "KaiTi", serif;
        }
        
        /* 🔮【佛核特调】引入 2000s 朦胧感与 Y2K 粉紫花海星尘迷雾图层 */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 35% 45%, rgba(255, 182, 193, 0.05) 0%, transparent 45%),
                        radial-gradient(circle at 65% 55%, rgba(186, 85, 211, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 2; /* 浮在画布上层，形成微弱的柔焦氛围滤镜 */
            mix-blend-mode: screen;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
            z-index: 1;
        }

        /* Y2K 悬浮铬合金控制面板 */
        .lang-panel {
            position: absolute;
            left: 35px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .lang-btn {
            width: 46px;
            height: 46px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            font-family: "Times New Roman", inherit;
            font-size: 15px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(8px);
        }

        /* 触碰时散发佛核标志性的粉紫/粉白冷调霓虹外发光 */
        .lang-btn.active, .lang-btn:hover {
            background: rgba(255, 182, 193, 0.15);
            color: #ffffff;
            border-color: rgba(238, 130, 238, 0.6);
            box-shadow: 0 0 25px rgba(255, 182, 193, 0.35);
            transform: scale(1.12) rotate(15deg);
        }

        /* 底部药丸控制中心 */
        .control-panel {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .btn {
            padding: 12px 32px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.6);
            font-family: inherit;
            font-size: 14px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 30px; 
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #restore-btn {
            font-size: 18px;
            font-weight: bold;
            border-radius: 50%; 
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-color: rgba(255,255,255,0.15);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border-color: rgba(135, 206, 250, 0.5);
            box-shadow: 0 10px 30px rgba(135, 206, 250, 0.15);
            transform: translateY(-3px);
        }

        #hint-text {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.18);
            font-size: 12px;
            letter-spacing: 4px;
            z-index: 5;
            pointer-events: none;
            text-align: center;
            width: 90%;
        }

        /* 独立阐释大面板 */
        #explanation-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 6, 15, 0.96); 
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100; 
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(12px);
        }

        #explanation-overlay.active {
            display: flex;
            opacity: 1;
        }

        .explanation-box {
            max-width: 800px;
            width: 80%;
            max-height: 75vh;
            overflow-y: auto;
            color: rgba(255, 255, 255, 0.8);
            padding: 50px 60px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.015) 0%, rgba(255, 255, 255, 0.002) 100%);
            backdrop-filter: blur(30px);
            border-radius: 16px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
        }

        .explanation-box h1 {
            font-size: 26px;
            font-weight: 400;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            letter-spacing: 4px;
        }

        .explanation-box p {
            font-size: 16px;
            line-height: 2.0; 
            text-indent: 2em;
            margin-bottom: 20px;
            letter-spacing: 1.5px;
            text-align: justify;
        }

        .concept-card {
            background: rgba(255, 255, 255, 0.01);
            border-left: 3px solid rgba(186, 85, 211, 0.4); /* 佛核暗紫强调条 */
            padding: 18px 24px;
            margin: 25px 0;
            border-radius: 0 8px 8px 0;
            font-size: 15px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.7);
        }

        .explanation-box::-webkit-scrollbar {
            width: 5px;
        }
        .explanation-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        /* 📱 手机移动端自适应收纳排版 */
        @media (max-width: 768px) {
            .lang-panel {
                left: 50% !important;
                top: 75px !important;
                transform: translateX(-50%) !important;
                flex-direction: row !important;
                gap: 15px !important;
            }
            .lang-btn {
                width: 42px !important;
                height: 42px !important;
                font-size: 14px !important;
            }
            .control-panel {
                bottom: 25px !important;
            }
            #restore-btn {
                width: 46px !important;
                height: 46px !important;
                font-size: 16px !important;
            }
            #hint-text {
                top: 15px !important;
                font-size: 11px !important;
                letter-spacing: 1px !important;
            }
            .explanation-box {
                padding: 30px 24px !important;
                width: 85% !important;
                max-height: 80vh !important;
            }
        }
    </style>
</head>
<body>

    <!-- 注入 Y2K 星芒艺术字符，强化千禧佛核味道 -->
    <div id="hint-text">✧✦ 明亮词句承载奥义 · 触之即读 ✦✧</div>
    <canvas id="water-canvas"></canvas>
    
    <!-- 左侧简繁译控制面板 -->
    <div class="lang-panel">
        <button id="btn-trad" class="lang-btn active">繁</button>
        <button id="btn-simp" class="lang-btn">简</button>
        <button id="btn-trans" class="lang-btn">译</button>
    </div>

    <!-- 底部控制 -->
    <div class="control-panel">
        <button id="restore-btn" class="btn" title="重置秩序">卍</button>
    </div>

    <!-- 词汇阐释图层 -->
    <div id="explanation-overlay">
        <div class="explanation-box">
            <h1 id="exp-title"></h1>
            <div id="exp-content"></div>
            <div style="margin-top: 40px; display: flex; justify-content: flex-end;">
                <button id="close-btn" class="btn">返回</button>
            </div>
        </div>
    </div>

    <script>
        // 洗净纯正字典数据集
        const dictionaryData = [
            { trad: "觀自在菩薩", simp: "观自在菩萨", content: "<p>即通常所说的观世音菩萨。其圣号来源有二：一是因中自利之修行工夫，菩萨在因地修行时用般若妙观智，由耳根一门深入，反闻自性，不被世间一切音声妄识分别所转，得耳门圆通；二是果上利他的度生大用，凡世间一切众生遇灾难时一心称念圣号，菩萨智照无遗，即时寻声赴感，无苦不拔。</p><p>“观”在此处非眼睛观察，而是心观，即是以自心观照身心世界之境，破除一切执著。“自在”即一切都已安然，对于万事万物产生随缘的态度，对一切外境也就能随意而自由自在。</p><p>“菩萨”是全称“菩提萨埵”的简称。菩提为觉，萨埵为有情（指有精神活动者）。合而言之乃是觉有情，即上求佛道以自觉，下化有情以觉他，是自觉觉他合一的修行者。</p>" },
            { trad: "行深般若波羅蜜多時", simp: "行深般若波罗蜜多时", content: "<p>“行”是修行、观行之意。“深”对浅而言，表示功行的超越。“般若波罗蜜多”意译作“慧到彼岸”、“智度”、“明度”，是指观照诸法实相，而穷尽一切智慧之边际，度生死此岸至涅槃彼岸之菩萨大慧。</p>" },
            { trad: "照見五蘊皆空", simp: "照见五蕴皆空", content: "<p>“照”是观照，“见”即彻见，即以般若智慧彻底洞察事物的真实相状。</p><p>“五蕴”是指色、受、想、行、识，是佛教将一切物质和精神性的因素的总称：</p><div class='concept-card'><strong>1. 色蕴：</strong>色是质碍意，指一切有形质、有障碍的物质现象；<br><strong>2. 受蕴：</strong>受是领纳意，是六根的精神感受作用；<br><strong>3. 想蕴：</strong>想是想象，对已受的境界重加分别想象；<br><strong>4. 行蕴：</strong>行是迁流造作义，指意念与意志作用；<br><strong>5. 识蕴：</strong>识了别，即分别和认知所缘所对事物能力。</div><p>“皆空”意思是说五蕴都是因缘聚合而成，缘生无性，都没有自身的本性，唯有假名而无实体。</p>" },
            { trad: "度一切苦厄", simp: "度一切苦厄", content: "<p>“苦”是苦恼、烦恼，“厄”是灾祸。只要能以般若智慧勘破五蕴皆空，无可执著，就能登至彼岸，度脱一切烦恼生死之苦厄。</p>" },
            { trad: "舍利子", simp: "舍利子", content: "<p>即舍利弗，是佛陀的十大弟子之一（智慧第一），他是本经的“当机”（即佛陀宣说此法的主要对话对象）。</p>" },
            { trad: "色不異空，空不異色。色即是空，空即是色", simp: "色不异空，空不异色，色即是空，空即是色", content: "<p>这是《心经》最为知名的语句，旨在从“体用不二”的角度讨论色（物质现象）与空（空性）的关系。空不是脱离假象而独立自存的实体，空就在现象当中，揭示的是物质的根本属性——无自性。</p><p>缘起假象谓之“色”，缘生无性谓之“空”。色虽分明显现而无实体，莫不当体即空，故说“色不异空”与“色即是空”；反之，空性要通过缘起来展现，故说“空不异色”。</p><p>此处还反映了空、假、中的辩证关系：初说“色不异空”是破凡夫着有之我执，当修空观；次说“空不异色”是破二乘着空之法执，当修假观；后说“色即是空，空即是色”展现中道妙理，破空假二边之执，令其修中观，达到体用圆融。</p>" },
            { trad: "是諸法空相", simp: "是诸法空相", content: "<p>“诸法”即所谓的“万法”，泛指一切世间现象。此句意为万法皆空，皆无有自性，其本质全部是由因缘聚合而成的假象。</p>" },
            { trad: "不生不滅，不垢不淨，不增不減", simp: "不生不灭，不垢不净，不增不减", content: "<p>这里描绘的是一切事物“空性”的状态。诸法自性本空，世间一切事物与现象在法相（外部状态）上虽然有因缘变化，但在其实相理体（本质）上是真常不变的，没有真正的生灭、垢净、增减之迁变。</p>" },
            { trad: "無眼、耳、鼻、舌、身、意", simp: "无眼、耳、鼻、舌、身、意", content: "<p>此为破“六根”（人类的认识器官及其相应的认识能力）。眼耳鼻舌身前五种乃是“色根”，对应一切物质现象；意根则为心之所依，生起心理和精神现象。在空性状态中，六根自性本空。</p>" },
            { trad: "無色、聲、香、味、觸、法", simp: "无色、声、香、味、触、法", content: "<p>此为破“六尘”（六根对应的认识对象）。尘有“染污”和“动摇”二义：它们能染污真心，且常在生灭变动。六尘遍污六根而生六识，使众生生出虚妄分别心，造作诸业，故又被称作“六贼”。在空性中其自体不实。</p>" },
            { trad: "無眼界，乃至無意識界", simp: "无眼界，乃至无意识界", content: "<p>此处乃破“十八界”（六根、六尘外加上由此发生的眼识至意识等“六识”）。识是了别之义。根、尘、识三者属于相依为命的密切关系：识依于根发生了别，根依于识发生作用，尘为根识所了别。在空性中，这十八界相依的界限不复存在，自性本空。</p>" },
            { trad: "無無明，亦無無明盡，乃至無老死，亦無老死盡", simp: "无无明，亦无无明尽，乃至无老死，亦无老死尽", content: "<p>此是破“十二因缘”（无明、行、识、名色、六入、触、受、爱、取、有、生、老死组成的生死轮回流转过程）。“无明”即不明，是一切烦恼的总根源。众生陷入轮回关键在于无明。</p><p>解脱的关键在于以般若观照工夫，观照无明无性，当体即空，这便是“无无明”；既然自性中本无生死流转之法，自然不需要刻意去灭除无明，这便是“无无明尽”。</p>" },
            { trad: "無苦、集、滅、道", simp: "无苦、集、灭、道", content: "<p>此乃破除“四谛”（佛教对痛苦来源和解脱方法的概括）。感受生死业报是苦（逼迫性）；身心积聚罪恶是集（招感性）；所证涅槃是灭（可证性）；修行门径是道（可修性）。</p><p>以般若智慧照见四谛，可知其当体即是真实空相。自性空寂，本无生死可了（无苦），亦无烦恼可断（无集）；自性具足，本不待修（无道），亦无须证（无灭）。</p>" },
            { trad: "無智亦無得", simp: "无智亦无得", content: "<p>“智”即是般若，为能求之心；“得”为所证的佛果或所求境界。在真空空相中，智与得均非实体可执。若以有所得的心去取求，就已经偏离了真空之境。</p>" },
            { trad: "菩提薩埵", simp: "菩提萨埵", content: "<p>梵语简称“菩萨”。菩提为觉，萨埵为有情（指有精神活动者）。合而言之乃是“觉有情”，即上求佛道以自觉，下化有情以觉他，即自觉觉他合一、悲智双运的修行者。</p>" },
            { trad: "依般若波羅蜜多故，心無掛礙", simp: "依般若波罗蜜多故，心无挂碍", content: "<p>“挂”指牵挂被网罩，比喻无明烦恼蔽覆真心；“碍”指妨碍或阻滞，比喻众生对事物的执著阻碍正道。依般若妙法观照修行，蔽覆与执著尽消，真心便不为物欲所动，常能住寂。</p>" },
            { trad: "無掛礙故，無有恐怖，遠離顛倒夢想", simp: "无挂碍故，无有恐怖，远离颠倒梦想", content: "<p>“颠倒”意谓众生错将因缘和合之幻像视作真实；“梦想”指执着于虚妄不实的幻想。众生应以般若起观照，让自己从无明中如梦初醒，永远摆脱这种颠倒执著、妄造恶业的轮回状态。</p>" },
            { trad: "究竟涅槃", simp: "究竟涅槃", content: "<p>“涅槃”意为灭、寂灭、无生，大译师玄奘将其翻译为“圆寂”（具足一切福德智慧叫做“圆”，永离一切烦恼生死叫做“寂”）。“究竟”特指大乘的最高涅槃，即福慧达到完美圆满，永不再被烦恼生死所困，获得纯善纯美的庄严解脱。</p>" },
            { trad: "三世諸佛", simp: "三世诸佛", content: "<p>“三世”是指过去、现在、未来。统称一切出现在三世的佛。其觉悟的最高真理核心，就是大乘思想的“缘起性空”。</p>" },
            { trad: "得阿耨多羅三藐三菩提", simp: "得阿耨多罗三藐三菩提", content: "<p>翻译为“無上正等正覺”。“正觉”指离开颠倒戏论的正确正智；“正等”指自觉之后能真正平等地行利他之事；“无上”是说此智慧至高无上。这是佛陀所成就的、真正平等觉知一切究极真理的圆满智慧。</p>" },
            { trad: "是大神咒，是大明咒，是無上咒，是無等等咒", simp: "是大神咒，是大明咒，是无上咒，是无等等咒", content: "<p>这是从密教总持功德的方面说明般若的力量。咒（陀罗尼）具有秘密功德与神妙不测的力用：<br>1. 大神咒：神有妙力，能驱除烦恼魔，解脱生死苦；<br>2. 大明咒：明有照了，能破除众生痴暗，照见无明虚妄；<br>3. 无上咒：无上超胜，能令人直趋无上涅槃；<br>4. 无等等咒：无等最高，能让人成就无上菩提。</p>" },
            { trad: "能除一切苦，真實不虛", simp: "能除一切苦，真实不虚", content: "<p>如来说法有显密之分，密咒虽不可明示，但具有秘密功德与极大神理。行者若能一心虔诚持诵，久之自能发生灵感与不可思议的灵验神效，总持善法令不失，总持恶法令不生，从而根绝逼迫，消除世间一切苦厄。</p>" },
            { trad: "揭諦揭諦，波羅揭諦，波羅僧揭諦，菩提薩婆訶", simp: "揭谛揭谛，波罗揭谛，波罗僧揭谛，菩提萨婆诃", content: "<p>这是般若波罗蜜多咒的密咒核心内容，依“尊重不翻”原则直接保留梵语原音。其中“揭谛”意为“度”；“波罗”指彼岸；“僧”指大众、大多数人；“萨婆诃”意为“速疾”。全句秘密功德意为：依此心咒虔诚持诵，便能急速跨越生死苦海，得成大觉，成就无上菩提。</p>" }
        ];

        const textTrad = "觀自在菩薩，行深般若波羅蜜多時，照見五蘊皆空，度一切苦厄。舍利子，色不異空，空不異色。色即是空，空即是色。受、想、行、識，亦復如是。舍利子，是諸法空相，不生不滅，不垢不淨，不增不減。是故空中無色，無受、想、行、識；無眼、耳、鼻、舌、身、意；無色、聲、香、味、觸、法；無眼界，乃至無意識界；無無明，亦無無明盡，乃至無老死，亦無老死盡；無苦、集、滅、道；無智亦無得。以無所得故，菩提薩埵，依般若波羅蜜多故，心無掛礙。無掛礙故，無有恐怖，遠離顛倒夢想，究竟涅槃。三世諸佛，依般若波羅蜜多故，得阿耨多羅三藐三菩提。故知般若波羅蜜多，是大神咒，是大明咒，是無上咒，是無等等咒，能除一切苦，真實不虛。故說般若波羅蜜多咒，即說咒曰：揭諦揭諦，波羅揭諦，波羅僧揭諦，菩提薩婆訶。";
        const textSimp = "观自在菩萨，行深般若波罗蜜多时，照见五蕴皆空，度一切苦厄。舍利子，色不异空，空不异色，色即是空，空即是色。受、想、行、识，亦复如是。舍利子，是诸法空相，不生不灭，不垢不净，不减不增。是故空中无色，无受、想、行、识；无眼、耳、鼻、舌、身、意；无色、声、香、味、触、法；无眼界，乃至无意识界；无无明，亦无无明尽，乃至无老死，亦无老死尽；无苦、集、灭、道；无智亦无得。以无所得故，菩提萨埵，依般若波罗蜜多故，心无挂碍。无挂碍故，无有恐怖，远离颠倒梦想，究竟涅槃。三世诸佛，依般若波罗蜜多故，得阿耨多罗三藐三菩提。故知般若波罗蜜多，是大神咒，是大明咒，是无上咒，是无等等咒，能除一切苦，真实不虚。故说般若波罗蜜多咒，即说咒曰：揭谛揭谛，波罗揭谛，波罗僧揭谛，菩提萨婆诃。";
        const textTrans = "观自在菩萨在修行深妙的智慧到彼岸法门时，彻底洞察到物质和精神的五类聚集全都没有实体，从而度脱了一切痛苦与灾难。舍利子啊，物质现象与空性没有区别，空性与物质现象也没有区别；物质现象的当体就是空性，空性的显现就是物质现象。受、想、行、识这四种精神现象，也是这样的道理。舍利子，这一切世间现象的空性状态，是不产生也不灭亡、不污垢也不清净、不增加也不减少的。因此，在空性中并没有物质实体，没有眼耳鼻舌身意这六种认识器官，没有色声香味触法这六种外界染污，没有从眼界到意识界这十八界；没有生命的无明源头，也没有无明的灭尽，乃至没有衰老死亡，也没有衰老死亡的灭尽；没有苦、集、灭、道这四种圣谛；没有求知能求的智慧，也没有执着所证得的佛果。因为明白万法皆无所得的缘故，菩提萨埵，依靠这深妙的智慧到彼岸，心中便再也没有任何牵挂与阻碍。因为毫无挂碍，便不再有任何恐惧害怕，彻底远离了虚妄的颠倒执着与梦幻幻想，证入最圆满的究竟涅槃解脱。三世的一切诸佛，也都是依止这深妙的智慧到彼岸法门，才最终证得至高无上的平等圆满觉悟。所以应当知道，这深妙的智慧到彼岸，是最神妙的咒语，是最光明的咒语，是最高上的咒语，是无与伦比的咒语，它真实不虚地能够消除世间一切苦厄。故说般若波罗蜜多咒，即说咒曰：度过去吧，度过去吧，一起渡到彼岸去吧，愿迅速成就无上觉悟。";

        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('water-canvas');
            const ctx = canvas.getContext('2d');
            const restoreBtn = document.getElementById('restore-btn');
            const btnTrad = document.getElementById('btn-trad');
            const btnSimp = document.getElementById('btn-simp');
            const btnTrans = document.getElementById('btn-trans');
            const overlay = document.getElementById('explanation-overlay');
            const expTitle = document.getElementById('exp-title');
            const expContent = document.getElementById('exp-content');
            const closeBtn = document.getElementById('close-btn');
            const hintText = document.getElementById('hint-text');

            let particles = [];
            let ripples = []; 
            let width, height;
            let isRestoring = false;
            let time = 0;
            let fontSize = 22;
            let titleY = 40; 

            let currentMode = 'trad'; 
            let currentText = textTrad;
            let currentDict = {};

            class VisualRipple {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.radius = 0;
                    this.maxRadius = window.innerWidth < 768 ? 220 : 380; 
                    this.alpha = 0.5;
                    this.speed = window.innerWidth < 768 ? 1.6 : 2.0; 
                }
                update() {
                    this.radius += this.speed;
                    this.alpha = 0.5 * (1 - this.radius / this.maxRadius);
                }
                draw() {
                    if (this.alpha <= 0) return;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    // 佛核特调：带有一丝极其淡雅的蓝紫色外焰圆环
                    ctx.strokeStyle = `rgba(160, 180, 255, ${this.alpha})`;
                    ctx.lineWidth = 1.0;
                    ctx.stroke();
                }
            }

            class Particle {
                constructor(char, x, y, explanationKey, isClickable) {
                    this.char = char;
                    this.originX = x; 
                    this.originY = y;
                    this.x = x;       
                    this.y = y;
                    this.vx = 0;      
                    this.vy = 0;      
                    this.isFloating = false; 
                    this.alpha = 1;       
                    this.targetAlpha = 1; 
                    this.explanationKey = explanationKey; 
                    this.isClickable = isClickable; 
                    this.randomSeed = Math.random() * 100;
                }

                update() {
                    this.alpha += (this.targetAlpha - this.alpha) * 0.08;

                    if (isRestoring) {
                        this.targetAlpha = 1;
                        const dx = this.originX - this.x;
                        const dy = this.originY - this.y;
                        this.vx += dx * 0.02; 
                        this.vy += dy * 0.02;
                        this.vx *= 0.82;      
                        this.vy *= 0.82;

                        if (Math.abs(dx) < 0.2 && Math.abs(dy) < 0.2 && Math.abs(this.vx) < 0.05) {
                            this.x = this.originX;
                            this.y = this.originY;
                            this.isFloating = false;
                            this.vx = 0;
                            this.vy = 0;
                        }
                    } else if (this.isFloating) {
                        this.vx += Math.sin(time * 0.5 + this.originY * 0.008 + this.randomSeed) * 0.008;
                        this.vy += Math.cos(time * 0.5 + this.originX * 0.008 + this.randomSeed) * 0.008;
                        this.vx *= 0.9915; 
                        this.vy *= 0.9915;
                    } else {
                        this.x = this.originX;
                        this.y = this.originY;
                        return;
                    }

                    this.x += this.vx;
                    this.y += this.vy;
                }

                draw() {
                    if (this.alpha < 0.005) return;
                    // 如果是白话译文模式，全局文字呈现均匀纯白
                    if (currentMode === 'trans') {
                        ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha * 0.85})`;
                    } else {
                        if (this.isClickable) {
                            ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`; 
                        } else {
                            ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha * 0.35})`; 
                        }
                    }
                    ctx.fillText(this.char, this.x, this.y);
                }
            }

            function init() {
                width = window.innerWidth;
                height = window.innerHeight;
                
                const dpr = window.devicePixelRatio || 1;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
                ctx.scale(dpr, dpr);

                particles = [];
                ripples = [];
                isRestoring = false;
                
                currentText = currentMode === 'trad' ? textTrad : (currentMode === 'simp' ? textSimp : textTrans);
                
                currentDict = {};
                dictionaryData.forEach(item => {
                    let key = currentMode === 'trad' ? item.trad : item.simp;
                    currentDict[key] = item.content;
                });

                const dictKeys = Object.keys(currentDict).sort((a, b) => b.length - a.length);

                // 精准匹配
                let phraseMap = new Array(currentText.length).fill(null);
                for (let i = 0; i < currentText.length; i++) {
                    for (let key of dictKeys) {
                        if (currentText.substr(i, key.length) === key) {
                            for (let j = 0; j < key.length; j++) {
                                phraseMap[i + j] = key;
                            }
                            break; 
                        }
                    }
                }

                const isMobile = width < 768;

                // 【核心要求 1】：白话译文（trans）在任何屏幕下都必须强制横排（符合简体汉语习惯），手机端也强制横排
                if (currentMode === 'trans' || isMobile) {
                    fontSize = isMobile ? Math.max(14, Math.floor(width * 0.042)) : Math.max(16, Math.floor(width * 0.015));
                    ctx.font = `normal ${fontSize}px "SimSun", "Songti SC", serif`;
                    ctx.textBaseline = 'top';
                    ctx.textAlign = 'left'; 

                    const paddingX = isMobile ? width * 0.08 : width * 0.15;
                    const maxWidth = width - paddingX * 2;
                    const rowHeight = fontSize * 1.75;

                    let mockX = 0;
                    let mockY = 0;
                    for (let i = 0; i < currentText.length; i++) {
                        const char = currentText[i];
                        const charWidth = ctx.measureText(char).width;
                        if (mockX + charWidth > maxWidth) {
                            mockX = 0;
                            mockY += rowHeight;
                        }
                        mockX += charWidth;
                    }
                    const totalBlockHeight = mockY + rowHeight;
                    
                    const startX = paddingX;
                    const startY = isMobile ? Math.max(135, (height - totalBlockHeight) / 2 + 15) : (height - totalBlockHeight) / 2 + fontSize;
                    titleY = isMobile ? Math.max(25, startY - 75) : startY - fontSize * 3.2;

                    let currentX = startX;
                    let currentY = startY;

                    for (let i = 0; i < currentText.length; i++) {
                        const char = currentText[i];
                        const charWidth = ctx.measureText(char).width;

                        if (currentX + charWidth > startX + maxWidth) {
                            currentX = startX;
                            currentY += rowHeight;
                        }

                        // 如果是译文模式，强制不可点击，不挂载任何字典解构
                        const key = currentMode === 'trans' ? null : phraseMap[i];
                        const isClickable = key !== null;
                        particles.push(new Particle(char, currentX, currentY, key, isClickable));
                        currentX += charWidth;
                    }
                } else {
                    // 电脑端（繁/简）：经典大气纵向从右往左流排版
                    fontSize = Math.max(16, Math.floor(height * 0.026));
                    ctx.font = `normal ${fontSize}px "SimSun", "Songti SC", serif`;
                    ctx.textBaseline = 'top';
                    ctx.textAlign = 'center'; 

                    const colWidth = fontSize * 2.0;       
                    const rowHeight = fontSize * 1.35;     
                    const maxHeight = height * 0.62;       

                    const charsPerCol = Math.floor(maxHeight / rowHeight);
                    const totalCols = Math.ceil(currentText.length / charsPerCol);
                    const totalBlockWidth = totalCols * colWidth;
                    const totalBlockHeight = charsPerCol * rowHeight;

                    const startX = (width + totalBlockWidth) / 2 - colWidth / 2;
                    const startY = (height - totalBlockHeight) / 2 + fontSize; 
                    titleY = startY - fontSize * 2.8;

                    let currentX = startX;
                    let currentY = startY;

                    for (let i = 0; i < currentText.length; i++) {
                        const char = currentText[i];

                        if (currentY + rowHeight > startY + totalBlockHeight) {
                            currentY = startY;
                            currentX -= colWidth; 
                        }

                        const key = phraseMap[i];
                        const isClickable = key !== null;
                        particles.push(new Particle(char, currentX, currentY, key, isClickable));
                        currentY += rowHeight;
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                time += 0.01;

                // 绘制横向冠题
                ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
                ctx.textAlign = "center";
                ctx.font = `normal ${window.innerWidth < 768 ? fontSize * 1.15 : fontSize * 1.25}px "SimSun", "Songti SC", serif`;
                
                let currentTitle = "✧✦ 般若波羅蜜多心經 ✦✧";
                if (currentMode === 'simp') currentTitle = "✧✦ 般若波罗蜜多心经 ✦✧";
                if (currentMode === 'trans') currentTitle = "✧✦ 心经 · 白话现代译文 ✦✧";
                ctx.fillText(currentTitle, width / 2, titleY);

                // 动态复位画笔基础设置
                ctx.font = `normal ${fontSize}px "SimSun", "Songti SC", "STSong", serif`;
                if (currentMode === 'trans' || width < 768) ctx.textAlign = 'left';
                else ctx.textAlign = 'center';

                // 渲染视觉涟漪
                ripples = ripples.filter(r => {
                    r.update();
                    r.draw();
                    return r.alpha > 0;
                });

                let allRestored = true;
                particles.forEach(p => {
                    p.update();
                    p.draw();
                    if (p.isFloating || Math.abs(p.x - p.originX) > 0.5) {
                        allRestored = false;
                    }
                });

                if (isRestoring && allRestored) {
                    isRestoring = false;
                }

                requestAnimationFrame(animate);
            }

            // 扫描判断是否滑入高亮词组
            canvas.addEventListener('pointermove', (e) => {
                if (currentMode === 'trans') {
                    canvas.style.cursor = 'crosshair';
                    return;
                }
                const mouseX = e.clientX;
                const mouseY = e.clientY;
                let isHoveringWord = false;

                for (let p of particles) {
                    if (p.isClickable && p.alpha > 0.1) {
                        const dx = p.x - mouseX;
                        const dy = p.y - mouseY;
                        if (Math.sqrt(dx*dx + dy*dy) < fontSize * 1.3) {
                            isHoveringWord = true;
                            break;
                        }
                    }
                }
                canvas.style.cursor = isHoveringWord ? 'pointer' : 'crosshair';
            });

            // 点击触发
            canvas.addEventListener('pointerdown', (e) => {
                if (isRestoring) return;
                const mouseX = e.clientX;
                const mouseY = e.clientY;
                
                let clickedKey = null;
                // 仅在非译文模式下允许触发点读
                if (currentMode !== 'trans') {
                    for (let p of particles) {
                        if (p.isClickable && p.alpha > 0.1) {
                            const dx = p.x - mouseX;
                            const dy = p.y - mouseY;
                            if (Math.sqrt(dx*dx + dy*dy) < fontSize * 1.4) {
                                clickedKey = p.explanationKey;
                                break;
                            }
                        }
                    }
                }

                if (clickedKey) {
                    expTitle.innerText = clickedKey;
                    expContent.innerHTML = currentDict[clickedKey];
                    overlay.style.display = 'flex';
                    setTimeout(() => overlay.classList.add('active'), 10);
                }

                // 无论何种模式，水面击水涟漪和物理推开动效均完美保留
                ripples.push(new VisualRipple(mouseX, mouseY));
                const impactRadius = window.innerWidth < 768 ? 200 : 350; 
                const impactForce = window.innerWidth < 768 ? 6.5 : 8.5;  

                particles.forEach(p => {
                    const dx = p.x - mouseX;
                    const dy = p.y - mouseY;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < impactRadius && p.alpha > 0.05) {
                        p.isFloating = true;
                        const force = (impactRadius - distance) / impactRadius;
                        p.vx += (dx / (distance || 1)) * force * impactForce * 0.4;
                        p.vy += (dy / (distance || 1)) * force * impactForce * 0.4;
                    }
                });
            });

            // 连续双击归于空相
            canvas.addEventListener('dblclick', (e) => {
                if (isRestoring) return;
                isRestoring = false;
                const mouseX = e.clientX;
                const mouseY = e.clientY;

                particles.forEach(p => {
                    const dx = p.x - mouseX;
                    const dy = p.y - mouseY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    p.isFloating = true;
                    setTimeout(() => {
                        p.targetAlpha = 0;
                        p.vx += (dx / (distance || 1)) * 1.5;
                        p.vy += (dy / (distance || 1)) * 1.5;
                    }, distance * 1.4); 
                });
            });

            // 卍 按钮重置
            restoreBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                isRestoring = true;
                particles.forEach(p => {
                    p.targetAlpha = 1;
                    p.isFloating = true; 
                });
            });

            // 点击返回按钮平滑复原
            closeBtn.addEventListener('click', () => {
                overlay.classList.remove('active');
                setTimeout(() => {
                    overlay.style.display = 'none';
                    isRestoring = true;
                    particles.forEach(p => {
                        p.targetAlpha = 1;
                        p.isFloating = true;
                    });
                }, 400);
            });

            // 三分支按钮控制
            btnTrad.addEventListener('click', () => {
                if (currentMode === 'trad') return;
                currentMode = 'trad';
                btnTrad.classList.add('active');
                btnSimp.classList.remove('active');
                btnTrans.classList.remove('active');
                hintText.innerText = "✧✦ 明亮词句承载奥义 · 触之即读 ✦✧";
                init();
            });

            btnSimp.addEventListener('click', () => {
                if (currentMode === 'simp') return;
                currentMode = 'simp';
                btnSimp.classList.add('active');
                btnTrad.classList.remove('active');
                btnTrans.classList.remove('active');
                hintText.innerText = "✧✦ 明亮词句承载奥义 · 触之即读 ✦✧";
                init();
            });

            btnTrans.addEventListener('click', () => {
                if (currentMode === 'trans') return;
                currentMode = 'trans';
                btnTrans.classList.add('active');
                btnTrad.classList.remove('active');
                btnSimp.classList.remove('active');
                // 【佛核彩蛋】切换至译文模式时，将顶部的引导语变成充满佛核松弛、高冷 Swag 的态度语
                hintText.innerText = "✦✧ 𝐈𝐝𝐤. 𝐈𝐝𝐜. 𝐈𝐝𝐠𝐚𝐟. 随波逐流，法乐其中 ✧✦";
                init();
            });

            window.addEventListener('resize', () => {
                init();
            });

            init();
            animate();
        });
    </script>
